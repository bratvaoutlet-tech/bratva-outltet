<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bratva Outlet - Painel</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: #0b0f1a;
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
    }

    .card {
      background: #121826;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    canvas {
      margin-top: 20px;
      background: #121826;
      padding: 10px;
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Dashboard</h1>

    <div class="card">Faturamento: R$ 1250</div>
    <div class="card">Pedidos: 8</div>
    <div class="card">Lucro: R$ 520</div>

    <canvas id="grafico"></canvas>
  </div>

  <script>
    const ctx = document.getElementById('grafico');

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex'],
        datasets: [{
          label: 'Vendas',
          data: [200, 300, 150, 400, 250]
        }]
      }
    });
  </script>
</body>
</html>
