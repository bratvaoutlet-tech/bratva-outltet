```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Bratva Outlet</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #0f0f1a;
  color: #fff;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 28px;
}

.button {
  background: linear-gradient(135deg, #6c2bd9, #8b5cf6);
  padding: 10px 18px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: 600;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}

.card {
  background: #1a1a2e;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card span {
  color: #aaa;
  font-size: 14px;
}

.card h2 {
  margin-top: 10px;
  font-size: 22px;
}

/* GRÁFICO */
.chart-container {
  background: #1a1a2e;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 30px;
}

/* TABELA */
.table {
  background: #1a1a2e;
  border-radius: 16px;
  padding: 20px;
}

.table h3 {
  margin-bottom: 15px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  color: #aaa;
  font-size: 14px;
}

tr {
  border-top: 1px solid rgba(255,255,255,0.05);
}

.status {
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.pago {
  background: #16a34a;
}

.pendente {
  background: #eab308;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  body {
    padding: 10px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>📊 Dashboard</h1>
  <a href="/" class="button">Voltar</a>
</div>

<div class="cards">
  <div class="card">
    <span>Faturamento</span>
    <h2>R$ 1.250</h2>
  </div>

  <div class="card">
    <span>Pedidos</span>
    <h2>8</h2>
  </div>

  <div class="card">
    <span>Lucro</span>
    <h2>R$ 520</h2>
  </div>

  <div class="card">
    <span>Ticket Médio</span>
    <h2>R$ 156</h2>
  </div>
</div>

<div class="chart-container">
  <canvas id="grafico"></canvas>
</div>

<div class="table">
  <h3>Últimas vendas</h3>

  <table>
    <tr>
      <th>Produto</th>
      <th>Valor</th>
      <th>Status</th>
    </tr>

    <tr>
      <td>Tênis Nike</td>
      <td>R$ 250</td>
      <td><span class="status pago">Pago</span></td>
    </tr>

    <tr>
      <td>Adidas</td>
      <td>R$ 300</td>
      <td><span class="status pendente">Pendente</span></td>
    </tr>

    <tr>
      <td>Puma</td>
      <td>R$ 200</td>
      <td><span class="status pago">Pago</span></td>
    </tr>
  </table>
</div>

<script>
const ctx = document.getElementById('grafico');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex'],
    datasets: [{
      label: 'Vendas',
      data: [200, 300, 150, 400, 250],
      backgroundColor: '#6c2bd9',
      borderRadius: 8
    }]
  },
  options: {
    plugins: {
      legend: {
        labels: {
          color: '#fff'
        }
      }
    },
    scales: {
      x: {
        ticks: { color: '#aaa' }
      },
      y: {
        ticks: { color: '#aaa' }
      }
    }
  }
});
</script>

</body>
</html>
```
